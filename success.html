<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Pago exitoso! — Auténtica</title>
  <link rel="stylesheet" href="main.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#faf7f4; }
    .success-card {
      text-align:center;
      background:#fff;
      border-radius:20px;
      padding:60px 48px;
      box-shadow:0 8px 40px rgba(0,0,0,0.1);
      max-width:480px;
    }
    .success-icon { font-size:64px; margin-bottom:20px; }
    h1 { color:#2c1810; font-size:28px; margin-bottom:12px; }
    p { color:#888; font-size:16px; line-height:1.6; }
    a {
      display:inline-block;
      margin-top:28px;
      padding:14px 32px;
      background:#c8a96e;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
      transition:background 0.2s;
    }
    a:hover { background:#b8944a; }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">✅</div>
    <h1>¡Pago exitoso!</h1>
    <p>Tu pago fue procesado correctamente. Pronto recibirás un correo con los detalles de tu compra.</p>
    <a href="/">← Volver al inicio</a>
  </div>
</body>
</html>
